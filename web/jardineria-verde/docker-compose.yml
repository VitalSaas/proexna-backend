services:
  jardineria-verde:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - NEXT_PUBLIC_BUSINESS_NAME=Jardinería Verde
    restart: unless-stopped
    container_name: jardineria-verde-web

  # Servicio para desarrollo con hot reload
  jardineria-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SITE_URL=http://localhost:3001
    restart: unless-stopped
    container_name: jardineria-verde-dev
    profiles:
      - dev