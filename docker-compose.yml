services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=proexna
      - DB_USERNAME=laravel
      - DB_PASSWORD=laravel_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    networks:
      - laravel_network

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=proexna
      - MYSQL_USER=laravel
      - MYSQL_PASSWORD=laravel_password
      - MYSQL_ROOT_PASSWORD=root_password
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - laravel_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=laravel
      - PMA_PASSWORD=laravel_password
      - MYSQL_ROOT_PASSWORD=root_password
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      - mysql
    networks:
      - laravel_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel_network

  chatwoot-postgres:
    image: postgres:16-alpine
    container_name: proexna-chatwoot-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=chatwoot
      - POSTGRES_USER=chatwoot
      - POSTGRES_PASSWORD=002f4f762ccf55b2ed048310c245befedd427ec58e5a981c
    volumes:
      - chatwoot_postgres_data:/var/lib/postgresql/data
    networks:
      - laravel_network

  chatwoot-web:
    image: chatwoot/chatwoot:v3.15.0
    container_name: proexna-chatwoot-web
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./chatwoot/.env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
    entrypoint: docker/entrypoints/rails.sh
    command:
      - bundle
      - exec
      - rails
      - s
      - -p
      - "3000"
      - -b
      - 0.0.0.0
    depends_on:
      - chatwoot-postgres
      - redis
      - chatwoot-sidekiq
    networks:
      - laravel_network

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v3.15.0
    container_name: proexna-chatwoot-sidekiq
    restart: unless-stopped
    env_file:
      - ./chatwoot/.env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
    command:
      - bundle
      - exec
      - sidekiq
      - -C
      - config/sidekiq.yml
    depends_on:
      - chatwoot-postgres
      - redis
    networks:
      - laravel_network

  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: proexna-chatbot
    restart: unless-stopped
    expose:
      - "3030"
    env_file:
      - ./chatbot/.env
    volumes:
      - ./chatbot:/app
      - /app/node_modules
    depends_on:
      - chatwoot-web
    networks:
      - laravel_network

volumes:
  mysql_data:
  redis_data:
  chatwoot_postgres_data:

networks:
  laravel_network:
    driver: bridge