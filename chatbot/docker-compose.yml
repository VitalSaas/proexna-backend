services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vivahux-chatbot
    restart: unless-stopped
    ports:
      - "${PORT:-3030}:3030"
    volumes:
      - ./:/app
      - /app/node_modules
    env_file:
      - .env
    networks:
      - vivahux-chatbot

networks:
  vivahux-chatbot:
    driver: bridge
